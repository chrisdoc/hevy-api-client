name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4.4.0
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
          # No node-auth-token: use OIDC trusted publishing instead

      - name: Remove token auth for OIDC
        run: |
          for f in .npmrc "${NPM_CONFIG_USERCONFIG:-}"; do
            [ -n "$f" ] && [ -f "$f" ] && sed -i '/_authToken/d' "$f"
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          unset NODE_AUTH_TOKEN
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npm publish
          else
            pnpm exec semantic-release
          fi
